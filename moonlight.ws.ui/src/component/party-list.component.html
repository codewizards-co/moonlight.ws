<div class="filter-bar">
  <form class="filter-form">
    <mat-form-field class="name-filter-field">
      <mat-label>Name</mat-label>
      <input matInput name="name" [ngModel]="filterName$.getValue()" (ngModelChange)="filterName$.next($event)">
    </mat-form-field>
    <mat-form-field class="code-filter-field">
      <mat-label>Code</mat-label>
      <input matInput name="code" [ngModel]="filterCode$.getValue()" (ngModelChange)="filterCode$.next($event)">
    </mat-form-field>
  </form>

  @if (partyPage$|async; as partyPage) {
    @if (partyPage) {
      <mat-paginator [length]="partyPage.totalSize"
                     [pageSize]="pageSize$|async"
                     [pageSizeOptions]="[1, 2, 5, 10, 25, 50, 100, 500]"
                     [pageIndex]="pageIndex$|async"
                     (page)="onPageEvent($event)"
                     aria-label="Select page">
      </mat-paginator>
    }
  }
</div>

<hr/>

@if (loading$|async) {
  <mat-spinner></mat-spinner>
} @else {
  @if (partyPage$|async; as partyPage) {
    @if (partyPage) {
      <table mat-table [dataSource]="partyPage.items" [trackBy]="partyTrackBy" class="mat-elevation-z8">

        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let party"> {{party.code}} </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let party"> {{party.name}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnKeys"></tr>
        <tr mat-row (click)="onClick(party)" *matRowDef="let party; columns: columnKeys;"></tr>
      </table>
    }
    <hr/>
    <button matButton="elevated" type="button" (click)="onCreatePartyClick()">
      <mat-icon>add_circle_outline</mat-icon>
      Create new party
    </button>
  }
}
